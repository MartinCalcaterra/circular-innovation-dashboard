<!DOCTYPE html>
<html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f7f9fb;
        }

        .container {
            width: 90%;

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<body>
    <div class="container">

        {% endblock %}

</body>
</html>
