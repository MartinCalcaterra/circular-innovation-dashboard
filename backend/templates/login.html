{% extends "base.html" %}
{% block content %}

<style>
.login-box {
    width: 400px;
    margin: 120px auto;
    padding: 40px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    text-align: center;
}

.login-box input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.login-box button {
    margin-top: 20px;
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #2a9d8f, #f4c430);
    color: white;
    font-weight: bold;
    cursor: pointer;
}
</style>

<div class="login-box">
    <h2>CIC Member Portal</h2>
    <p>Enter demo username:</p>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="smallcompany / bigcompany / admin">
        <button type="submit">Login</button>
    </form>
</div>

{% endblock %}
