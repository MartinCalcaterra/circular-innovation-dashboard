{% extends "base.html" %}
{% block content %}

<style>
* {
    box-sizing: border-box;
}

.login-box {
    width: 420px;
    margin: 120px auto;
    padding: 50px 40px;
    background: white;
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    text-align: center;
}

.login-box h2 {
    margin-bottom: 10px;
}

.login-box p {
    color: #666;
    font-size: 14px;
}

.login-box input {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
}

.login-box input:focus {
    outline: none;
    border-color: #2a9d8f;
    box-shadow: 0 0 0 2px rgba(42,157,143,0.15);
}

.login-box button {
    margin-top: 25px;
    padding: 14px 24px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(90deg, #2a9d8f, #f4c430);
    color: white;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    transition: 0.2s ease;
}

.login-box button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.demo-credentials {
    margin-top: 25px;
    padding: 15px;
    background: #f7f7f7;
    border-radius: 10px;
    font-size: 13px;
    color: #444;
}
</style>

<div class="login-box">
    <h2>CIC Member Portal</h2>
    <p>Select your demo role to enter the system</p>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="initialmember / seniormember / leader / admin">
        <button type="submit">Enter  </button>
    </form>


{% endblock %}
